<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タクシー営業管理アプリ</title>

<style>
body{
    font-family:sans-serif;
    max-width:500px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#007AFF;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.result{
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🚕営業管理アプリ</h1>

<div class="card">

<label>日付</label>
<input type="date" id="date">

<label>天候</label>
<select id="weather">
<option>晴れ</option>
<option>曇り</option>
<option>雨</option>
</select>

<label>回数</label>
<input type="number" id="kaisuu">

<label>爾後回数</label>
<input type="number" id="jigo">

<label>迎車回数</label>
<input type="number" id="geisha">

<label>割引</label>
<input type="number" id="waribiki" value="0">

<label>メーター外営収</label>
<input type="number" id="extra" value="0">

<button onclick="calc()">
計算
</button>

</div>

<div class="card">

<div class="result">
水揚げ
</div>

<div id="uriage">
0 円
</div>

<br>

<div class="result">
税抜売上
</div>

<div id="zeinuki">
0 円
</div>

</div>

<script>

function calc(){

let k =
Number(document.getElementById("kaisuu").value||0);

let j =
Number(document.getElementById("jigo").value||0);

let g =
Number(document.getElementById("geisha").value||0);

let w =
Number(document.getElementById("waribiki").value||0);

let e =
Number(document.getElementById("extra").value||0);

let uriage =
(k*500)+(j*100)+(g*400)-w+e;

let zeinuki =
Math.round(uriage/1.1);

document.getElementById("uriage").innerHTML =
uriage.toLocaleString()+" 円";

document.getElementById("zeinuki").innerHTML =
zeinuki.toLocaleString()+" 円";

}

</script>

</body>
</html>
