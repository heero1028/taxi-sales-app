<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Taxi Sales App Ver1.3</title>

<style>

body{
padding:20px;
font-size:24px;
font-family:sans-serif;
}

input{
width:100%;
font-size:24px;
padding:10px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:24px;
margin-bottom:10px;
}

h2{
margin-top:25px;
}

.history{
border-bottom:1px solid #ccc;
padding:10px 0;
}

</style>

</head>

<body>

<h1>🚕 Taxi Sales App Ver1.3</h1>

日付<br>
<input id="hiduke" type="date">

出庫時間<br>
<input id="syukko" type="time">

入庫時間<br>
<input id="nyuko" type="time">

売上(税込)<br>
<input id="uriage" type="number">

歩率(%)<br>
<input id="buritsu" type="number" value="60">

<button onclick="calc()">計算</button>

<button onclick="saveData()">日報保存</button>

<h2>税抜売上：
<span id="zeinuki">0</span>円
</h2>

<h2>給与予測：
<span id="kyuryo">0</span>円
</h2>

<h2>労働時間：
<span id="roudou">0時間0分</span>
</h2>

<h2>時給：
<span id="jikyuu">0</span>円
</h2>

<button onclick="clearHistory()">
履歴削除
</button>

<h2>保存履歴</h2>

<div id="history"></div>

<script>

function calc(){

let uriage=
Number(document.getElementById("uriage").value);

let buritsu=
Number(document.getElementById("buritsu").value);

let zeinuki=
Math.round(uriage/1.1/10)*10;

let kyuryo=
Math.floor(zeinuki*buritsu/100);

document.getElementById("zeinuki").innerHTML=
zeinuki.toLocaleString();

document.getElementById("kyuryo").innerHTML=
kyuryo.toLocaleString();

let syukko=
document.getElementById("syukko").value;

let nyuko=
document.getElementById("nyuko").value;

let start=
new Date("2000-01-01 "+syukko);

let end=
new Date("2000-01-01 "+nyuko);

if(end<start){
end.setDate(end.getDate()+1);
}

let diff=
(end-start)/(1000*60);

let h=
Math.floor(diff/60);

let m=
diff%60;

document.getElementById("roudou").innerHTML=
h+"時間"+m+"分";

let totalHours=
diff/60;

let jikyuu=0;

if(totalHours>0){
jikyuu=Math.floor(kyuryo/totalHours);
}

document.getElementById("jikyuu").innerHTML=
jikyuu.toLocaleString();

}
 function saveData(){

  let date = document.getElementById("hiduke").value;
  let uriage = Number(document.getElementById("uriage").value);
  let kyuryo = document.getElementById("kyuryo").innerText.replace(/,/g,"");
  let roudou = document.getElementById("roudou").innerText;
  let jikyuu = document.getElementById("jikyuu").innerText.replace(/,/g,"");

  let data = {
    date: date,
    uriage: uriage,
    kyuryo: kyuryo,
    roudou: roudou,
    jikyuu: jikyuu
  };

  let history = JSON.parse(localStorage.getItem("history") || "[]");

  history.push(data);

  history.sort((a,b)=>{
    return b.date.localeCompare(a.date);
  });

  localStorage.setItem("history", JSON.stringify(history));

  showHistory();
}

function clearHistory(){

  if(confirm("履歴を全て削除しますか？")){

    localStorage.removeItem("history");

    showHistory();

  }

}

function showHistory(){

  let history = JSON.parse(localStorage.getItem("history") || "[]");

  let text = "";

  history.forEach(item=>{

    text +=
      item.date +
      " 売上:" + Number(item.uriage).toLocaleString() + "円" +
      " 給与:" + Number(item.kyuryo).toLocaleString() + "円" +
      " 労働時間:" + item.roudou +
      " 時給:" + Number(item.jikyuu).toLocaleString() + "円" +
      "<br><br>";

  });

  document.getElementById("history").innerHTML = text;

}

showHistory();

</script>
</body>
</html>
