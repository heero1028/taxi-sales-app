<body>
<h1>🚕 Taxi Sales App Ver1.1</h1>

売上(税込)
歩率(%)
計算

<h2>税抜売上：<span id="zeinuki">0</span>円</h2>
<h2>給与予測：<span id="kyuryo">0</span>円</h2>
<script>
function calc() {
let uriage = Number(document.getElementById("uriage").value);
let buritsu = Number(document.getElementById("buritsu").value);
let zeinuki = Math.round(uriage / 1.1 / 10) * 10;
let kyuryo = Math.floor(zeinuki * buritsu / 100);
document.getElementById("zeinuki").innerHTML =
zeinuki.toLocaleString();
document.getElementById("kyuryo").innerHTML =
kyuryo.toLocaleString();
}
</script>
