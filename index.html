<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Sales App Ver1.0</title>

<style>
body{
    font-family:sans-serif;
    max-width:500px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
}

.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Taxi Sales App Ver1.0</h1>

売上(税込)<br>
<input id="uriage" type="number">

<button onclick="calc()">計算</button>

<div class="result">
税抜売上：<span id="zeinuki">0</span> 円
</div>

<script>
function calc(){

let uriage =
Number(document.getElementById("uriage").value);

let zeinuki =
Math.round(uriage / 1.1 / 10) * 10;

document.getElementById("zeinuki").innerHTML =
zeinuki.toLocaleString();

}
</script>

</body>
</html>
